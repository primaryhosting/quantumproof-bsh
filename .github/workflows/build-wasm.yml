name: Build WASM

on:
  push:
    paths:
      - 'bsh-core/**'
      - 'bsh-wasm/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: jetli/wasm-pack-action@v0.4.0

      - name: Build WASM
        run: cd bsh-wasm && wasm-pack build --target web --release --out-dir ../pkg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bsh-wasm-pkg
          path: pkg/

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: wasm-${{ github.sha }}
          files: |
            pkg/bsh_wasm_bg.wasm
            pkg/bsh_wasm.js
            pkg/bsh_wasm.d.ts
